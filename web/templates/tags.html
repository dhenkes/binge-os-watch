{{template "layout" .}}

{{define "title"}}Tags — binge-os-watch{{end}}

{{define "content"}}
<div class="page">
    <div class="page-header">
        <div class="breadcrumb"><span class="current">Tags <span class="count">({{len .AllTags}})</span></span></div>
        <div class="page-header-row">
            <div class="filter-bar">
                <a href="/tags/new-page">New</a>
            </div>
            <div class="sort-bar">
                Sort:
                <a href="/tags"{{if ne .Sort "newest"}} class="active"{{end}}>Name</a>
                <a href="/tags?sort=newest"{{if eq .Sort "newest"}} class="active"{{end}}>Newest</a>
            </div>
        </div>
        <hr class="page-header-sep">
    </div>

    {{if .AllTags}}
    <ul class="item-list">
        {{range .AllTags}}
        <li class="item">
            <div class="item-row">
                <div class="item-content">
                    <a href="/?view=all&tag={{.ID}}" style="font-weight: 600;">{{.Name}}</a>
                    <div class="item-meta">{{index $.TagCounts .ID}} items</div>
                </div>
                <div class="item-actions">
                    <a href="/tags/{{.ID}}/edit" class="inline-btn">edit</a>
                    <details class="inline-confirm">
                        <summary>delete</summary>
                        <form autocomplete="off" method="post" action="/tags/{{.ID}}/delete">
                            <input type="hidden" name="csrf_token" value="{{$.CSRFToken}}" autocomplete="off">
                            <button type="submit" class="confirm-delete">confirm?</button>
                        </form>
                    </details>
                </div>
            </div>
        </li>
        {{end}}
    </ul>
    {{else}}
    <div class="empty-state">No tags yet.</div>
    {{end}}
</div>
{{end}}
