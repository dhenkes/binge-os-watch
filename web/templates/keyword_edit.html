{{template "layout" .}}

{{define "title"}}Edit keyword — binge-os-watch{{end}}

{{define "content"}}
<div class="page">
    <div class="page-header">
        <div class="breadcrumb"><a href="/suggestions">{{call .T "keywords.suggestions"}}</a><span class="sep">/</span><a href="/keywords">{{call .T "keywords.title"}}</a><span class="sep">/</span><span class="current">Edit</span></div>
        <hr class="page-header-sep">
    </div>

    <form autocomplete="off" method="post" action="/keywords/{{.Watch.ID}}/update">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" autocomplete="off">
        <div class="settings-row">
            <label>Keyword</label>
            <input type="text" name="keyword" value="{{.Watch.Keyword}}" required autofocus autocomplete="off">
        </div>
        <div class="settings-row">
            <label>Media types</label>
            <select name="media_types" style="width: auto;">
                <option value="movie,tv"{{if eq .Watch.MediaTypes "movie,tv"}} selected{{end}}>Movies &amp; TV</option>
                <option value="movie"{{if eq .Watch.MediaTypes "movie"}} selected{{end}}>Movies only</option>
                <option value="tv"{{if eq .Watch.MediaTypes "tv"}} selected{{end}}>TV Shows only</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">{{call .T "action.save"}}</button>
    </form>
</div>
{{end}}
